name: Integration Tests

on:
  # Run twice daily (9-10 AM and 6-7 PM CET)
  schedule:
    - cron: "0 8,17 * * *"

  # Allow manual trigger
  workflow_dispatch:

  # Run on PRs that modify integration tests or integration-tested packages
  pull_request:
    paths:
      - "packages/*/test/integration.test.ts"
      - "packages/agent-skills/**"
      - "packages/atlassian-common/src/**"
      - "packages/confluence-to-markdown/src/**"
      - "packages/confluence-to-markdown/package.json"
      - "packages/jira-api-client/src/**"
      - "packages/jira-cli/src/**"
      - "packages/jira-cli/package.json"
      - ".github/workflows/integration-test.yml"

jobs:
  test-confluence:
    name: Confluence CLI Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/setup
        with:
          node-version: "24.10.0"

      - name: Build packages
        run: pnpm --filter @knpkv/agent-skills --filter @knpkv/confluence-api-client --filter @knpkv/confluence-to-markdown build

      - name: Run integration tests
        env:
          CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
          CONFLUENCE_ROOT_PAGE_ID: ${{ vars.CONFLUENCE_ROOT_PAGE_ID }}
          CONFLUENCE_API_KEY: ${{ secrets.CONFLUENCE_API_KEY }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
        run: pnpm --filter @knpkv/confluence-to-markdown test:integration

  test-jira:
    name: Jira CLI Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/setup
        with:
          node-version: "24.10.0"

      - name: Run integration tests
        env:
          JIRA_INTEGRATION: ${{ secrets.JIRA_EMAIL != '' && secrets.JIRA_API_KEY != '' && '1' || '0' }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL || 'https://knpkv.atlassian.net' }}
          JIRA_ISSUE_KEY: ${{ vars.JIRA_ISSUE_KEY || 'KAN-1' }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
        run: pnpm --filter @knpkv/jira-cli test:integration

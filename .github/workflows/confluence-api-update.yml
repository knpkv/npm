name: Confluence API Spec Check

on:
  # Daily at 6 AM UTC
  schedule:
    - cron: "0 6 * * *"

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-spec:
    name: Check Confluence API Spec Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/setup
        with:
          node-version: "24.10.0"

      - name: Check for spec updates
        id: check
        run: |
          if pnpm --filter @knpkv/confluence-api-client regenerate:check; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Regenerate specs
        if: steps.check.outputs.updated == 'true'
        run: pnpm --filter @knpkv/confluence-api-client regenerate

      - name: Build package
        if: steps.check.outputs.updated == 'true'
        run: pnpm --filter @knpkv/confluence-api-client build

      - name: Run tests
        if: steps.check.outputs.updated == 'true'
        run: pnpm --filter @knpkv/confluence-api-client test

      - name: Create changeset
        if: steps.check.outputs.updated == 'true'
        run: |
          mkdir -p .changeset
          cat > .changeset/confluence-api-spec-update.md <<'CHANGESET'
          ---
          "@knpkv/confluence-api-client": patch
          ---

          Update generated Confluence API OpenAPI specs.
          CHANGESET

      - name: Create Pull Request
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(confluence-api-client): update OpenAPI specs"
          title: "chore(confluence-api-client): update OpenAPI specs"
          body: |
            Automated update of Confluence API OpenAPI specs.

            Review the generated schema changes and update wrapper files if needed:
            - `packages/confluence-api-client/src/ConfluenceApiClient.ts`
            - `packages/confluence-api-client/src/generated/v1/index.ts`
            - `packages/confluence-api-client/src/generated/v2/index.ts`

            This PR includes a patch changeset so the release workflow can create the version plan.
          branch: chore/confluence-api-spec-update
          delete-branch: true
          labels: |
            dependencies
            automated

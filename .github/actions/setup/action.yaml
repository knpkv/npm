name: Setup
description: Perform standard setup and install dependencies using pnpm.
inputs:
  node-version:
    description: The version of Node.js to install
    required: false
  deno-version:
    description: The version of Deno to install
    required: false
  bun-version:
    description: The version of Bun to install
    required: false

runs:
  using: composite
  steps:
    - name: Install Socket Firewall
      shell: bash
      env:
        SOCKET_FIREWALL_SHA256: 4dc46b626a7c5b81c0b54e1984ee53be5a628dbfb2f55ab14e9b04c8a134db6a
        SOCKET_FIREWALL_URL: https://github.com/SocketDev/sfw-free/releases/download/v1.13.1/sfw-free-linux-x86_64
      run: |
        install_directory="${RUNNER_TEMP}/socket-firewall"
        binary_path="${install_directory}/sfw"
        mkdir -p "${install_directory}"
        curl --fail --location --retry 4 --retry-all-errors \
          --output "${binary_path}" "${SOCKET_FIREWALL_URL}"
        printf '%s  %s\n' "${SOCKET_FIREWALL_SHA256}" "${binary_path}" \
          | sha256sum --check --strict
        chmod +x "${binary_path}"
        echo "${install_directory}" >> "${GITHUB_PATH}"
    - name: Install pnpm
      uses: pnpm/action-setup@v6
    - name: Install node
      uses: actions/setup-node@v6
      if: ${{ inputs.node-version != '' }}
      with:
        node-version: ${{ inputs.node-version }}
    - name: Install deno
      uses: denoland/setup-deno@v2
      if: ${{ inputs.deno-version != '' }}
      with:
        deno-version: ${{ inputs.deno-version }}
    - name: Install bun
      uses: oven-sh/setup-bun@v2
      if: ${{ inputs.bun-version != '' }}
      with:
        bun-version: ${{ inputs.bun-version }}
    - name: Install dependencies
      shell: bash
      run: sfw pnpm install --frozen-lockfile

# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: no-direct-fetch
language: tsx
severity: error
message: "Use @effect/platform HttpClient instead of raw fetch"

rule:
  any:
    - pattern: fetch($$$ARGS)
    - pattern: globalThis.fetch($$$ARGS)

files:
  - "packages/**/*.ts"
  - "packages/**/*.tsx"
  - "scripts/**/*.ts"

ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/generated/**"
  - "repos/**"
  - "scratchpad/**"

note: |
  Raw fetch bypasses Effect's HttpClient service, typed platform errors, and
  layer-based testing.

  Prefer @effect/platform's HttpClient:

  const client = yield* HttpClient.HttpClient
  const response = yield* client.get(url)

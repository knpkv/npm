# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: no-interface-in-models
language: tsx
severity: error
message: "Use Schema.Struct instead of interface for domain models"

rule:
  pattern: export interface $NAME { $$$BODY }

files:
  - "**/models/**/*.ts"
  - "**/models/**/*.tsx"
  - "**/domain/**/*.ts"
  - "**/domain/**/*.tsx"

ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/generated/**"
  - "repos/**"
  - "scratchpad/**"

note: |
  Domain models should use Effect Schema as the source of truth so runtime
  validation and TypeScript inference stay aligned.

  Prefer:

  export const User = Schema.Struct({
    id: Schema.String
  })

  export type User = Schema.Schema.Type<typeof User>

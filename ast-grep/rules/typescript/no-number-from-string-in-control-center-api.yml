# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: no-number-from-string-in-control-center-api
language: tsx
severity: error
message: "Use a canonical wire-number schema instead of JavaScript-coercing Schema.NumberFromString in public HTTP contracts."

rule:
  any:
    - pattern: $NAMESPACE.NumberFromString
    - all:
        - kind: import_specifier
        - has:
            field: name
            regex: ^NumberFromString$
        - not:
            regex: ^type\s
        - inside:
            pattern: import { $$$IMPORTS } from "effect/Schema"
            stopBy: end

files:
  - "packages/control-center/src/api/**/*.ts"

note: |
  NumberFromString accepts ambiguous JavaScript forms such as whitespace, leading
  zeroes, signs, exponents, and hexadecimal. Public HTTP contracts must import a
  purpose-built canonical wire schema with an explicit grammar and bounds.

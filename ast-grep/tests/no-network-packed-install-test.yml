id: no-network-packed-install
valid:
  - |
    yield* run("pnpm", ["install", "--offline", "--ignore-scripts", "--no-frozen-lockfile"], consumer)
  - |
    ChildProcess.make("pnpm", ["install", "--offline", "--ignore-scripts"])
invalid:
  - |
    yield* run("npm", ["install", "--ignore-scripts", "--no-audit", "--no-fund"], consumer)
  - |
    ChildProcess.make("npm", ["install", "--ignore-scripts"])

id: no-unchecked-packed-child-process
snapshots:
  ? |
    yield* spawner.string(ChildProcess.make("pnpm", ["pack"], { cwd: packageRoot }))
  : labels:
      - source: 'spawner.string(ChildProcess.make("pnpm", ["pack"], { cwd: packageRoot }))'
        style: primary
        start: 7
        end: 80
  ? |
    yield* spawner.lines(ChildProcess.make("node", ["verify.mjs"], { cwd: consumer }))
  : labels:
      - source: 'spawner.lines(ChildProcess.make("node", ["verify.mjs"], { cwd: consumer }))'
        style: primary
        start: 7
        end: 82
